<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado - Smart Migration System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="container fade-in" style="max-width: 500px;">
        <div class="glass-panel p-5 text-center">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-4"
                style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1);">
                <i class="bi bi-shield-x text-danger fs-1"></i>
            </div>

            <h2 class="fw-bold mb-2">Acceso Denegado</h2>
            <p class="text-secondary mb-4">
                No tienes permisos para acceder a esta sección.<br>
                Solo usuarios con rol autorizado pueden ver este contenido.
            </p>

            <div class="glass-panel p-3 mb-4" style="background: rgba(50, 81, 144, 0.05);">
                <div class="d-flex align-items-center gap-2 justify-content-center">
                    <i class="bi bi-person-badge text-secondary"></i>
                    <span class="text-secondary">Tu rol actual: </span>
                    <span class="fw-bold" id="currentRole">—</span>
                </div>
            </div>

            <div class="d-flex gap-2 justify-content-center">
                <a href="dashboard.html" class="btn btn-primary-custom">
                    <i class="bi bi-house-door me-1"></i> Ir al Inicio
                </a>
                <button class="btn btn-secondary-custom" onclick="SecurityService.logout()">
                    <i class="bi bi-box-arrow-left me-1"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const user = SecurityService.getUser();
        if (user) {
            document.getElementById('currentRole').innerText = user.role_display;
        }
    </script>
</body>

</html>
