<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - Smart Migration System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container fade-in" style="max-width: 450px;">
        <div class="glass-panel p-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle mb-3" style="width: 60px; height: 60px;">
                    <i class="bi bi-shield-lock text-primary fs-2"></i>
                </div>
                <h2 class="fw-bold mb-1">Nueva Contraseña</h2>
                <p class="text-secondary text-sm px-2">Crea una nueva contraseña para tu cuenta (mínimo 8 caracteres).</p>
            </div>

            <!-- Alerta de Éxito / Error (Oculta por defecto) -->
            <div id="statusAlert" class="alert d-none py-2 px-3 text-sm" role="alert"></div>

            <form id="resetPasswordForm">
                <div class="mb-3">
                    <label class="form-label text-secondary small">Nueva Contraseña</label>
                    <input type="password" id="newPassword" class="form-control form-control-custom" required placeholder="••••••••" minlength="8">
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-secondary small">Confirmar Contraseña</label>
                    <input type="password" id="newPasswordConfirm" class="form-control form-control-custom" required placeholder="••••••••" minlength="8">
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-primary-custom w-100 mb-3 d-flex justify-content-center align-items-center gap-2">
                    <span>Guardar contraseña</span>
                    <i class="bi bi-check-circle"></i>
                </button>
                
                <div class="text-center mt-3 d-none" id="loginLinkContainer">
                    <a href="login.html" class="btn btn-outline-secondary btn-sm w-100">
                        Ir a Iniciar Sesión
                    </a>
                </div>
            </form>
            
            <div id="invalidLinkMessage" class="text-center d-none">
                <p class="text-danger">El enlace de recuperación es inválido o ha expirado.</p>
                <a href="forgot-password.html" class="btn btn-primary-custom w-100">
                    Solicitar nuevo enlace
                </a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const resetPasswordForm = document.getElementById('resetPasswordForm');
        const statusAlert = document.getElementById('statusAlert');
        const btnSubmit = document.getElementById('btnSubmit');
        const invalidLinkMessage = document.getElementById('invalidLinkMessage');
        const loginLinkContainer = document.getElementById('loginLinkContainer');

        // Extraer los parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const token = urlParams.get('token');

        // Si faltan parámetros, ocultar formulario y mostrar error
        if (!uid || !token) {
            resetPasswordForm.classList.add('d-none');
            invalidLinkMessage.classList.remove('d-none');
        }

        resetPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const newPasswordConfirm = document.getElementById('newPasswordConfirm').value;
            
            statusAlert.classList.add('d-none');
            statusAlert.classList.remove('alert-success', 'alert-danger');

            if (newPassword !== newPasswordConfirm) {
                statusAlert.classList.remove('d-none');
                statusAlert.classList.add('alert-danger');
                statusAlert.innerText = 'Las contraseñas no coinciden.';
                return;
            }
            
            // Estado de carga
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm" aria-hidden="true"></span> Guardando...';
            btnSubmit.disabled = true;

            const payload = {
                uid: uid,
                token: token,
                new_password: newPassword,
                new_password_confirm: newPasswordConfirm
            };

            try {
                // RF06: Endpoint sin autenticación para confirmar el reset
                const data = await fetchAPI('/auth/password-reset/confirm/', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                // Mostrar mensaje de éxito (CP 2.1 - La próxima vez que use el enlace dará error)
                statusAlert.classList.remove('d-none');
                statusAlert.classList.add('alert-success');
                statusAlert.innerText = data.detail || 'Contraseña restablecida correctamente. Ya puedes iniciar sesión.';
                
                // Ocultar formulario, mostrar botón de ir al login
                resetPasswordForm.querySelector('.mb-3').classList.add('d-none');
                resetPasswordForm.querySelector('.mb-4').classList.add('d-none');
                btnSubmit.classList.add('d-none');
                loginLinkContainer.classList.remove('d-none');

            } catch (error) {
                statusAlert.classList.remove('d-none', 'alert-success');
                statusAlert.classList.add('alert-danger');
                
                if(error.data && error.data.detail) {
                    statusAlert.innerText = error.data.detail; // Ej: "El enlace es inválido..." (CP 2.1)
                } else if(error.data && error.data.new_password_confirm) {
                    statusAlert.innerText = error.data.new_password_confirm[0];
                } else if(error.data && error.data.new_password) {
                    statusAlert.innerText = error.data.new_password[0];
                } else {
                    statusAlert.innerText = 'Ha ocurrido un error. Verifica el enlace o intenta de nuevo.';
                }
            } finally {
                if(!btnSubmit.classList.contains('d-none')) {
                    btnSubmit.innerHTML = originalText;
                    btnSubmit.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
