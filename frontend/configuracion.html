<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración global - Smart Migration System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="d-flex align-items-center gap-2 mb-5 px-2">
            <i class="bi bi-rocket-takeoff text-primary fs-3"></i>
            <h4 class="mb-0 fw-bold">SmartMig</h4>
        </div>

        <nav class="nav flex-column gap-1">
            <a href="dashboard.html" class="nav-link-custom">
                <i class="bi bi-house-door"></i> Inicio
            </a>
            <a href="recargas.html" class="nav-link-custom">
                <i class="bi bi-cash-stack"></i> Registro de Recargas
            </a>
            <a href="usuarios.html" class="nav-link-custom d-none" id="navUsers">
                <i class="bi bi-people"></i> Gestión de Usuarios
            </a>
            <a href="bitacora.html" class="nav-link-custom d-none" id="navBitacora">
                <i class="bi bi-journal-text"></i> Bitácora de Login
            </a>
            <a href="configuracion.html" class="nav-link-custom active d-none" id="navConfig">
                <i class="bi bi-sliders"></i> Configuración global
            </a>
            <a href="#" class="nav-link-custom">
                <i class="bi bi-person-lines-fill"></i> Clientes Prepago
            </a>
            <a href="#" class="nav-link-custom mt-auto text-danger mt-5" onclick="SecurityService.logout()">
                <i class="bi bi-box-arrow-left text-danger"></i> Cerrar Sesión
            </a>
        </nav>
    </div>

    <div class="main-content fade-in">
        <header class="mb-4">
            <h2 class="fw-bold">Configuración global del sistema</h2>
            <p class="text-secondary mb-0">
                Ajusta variables globales sin reiniciar el servidor.
            </p>
        </header>

        <div id="alertConfig" class="alert d-none py-2 px-3" role="alert"></div>

        <div class="glass-panel p-4">
            <form id="formConfig">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label text-secondary small" for="analysisInterval">
                            Periodicidad de análisis (minutos)
                        </label>
                        <input type="number" min="5" max="10080" class="form-control form-control-custom" id="analysisInterval" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-secondary small" for="twilioLimit">
                            Límite diario de mensajes Twilio
                        </label>
                        <input type="number" min="1" max="1000000" class="form-control form-control-custom" id="twilioLimit" required>
                    </div>
                </div>
                <div class="mt-4 d-flex align-items-center gap-3 flex-wrap">
                    <button type="submit" class="btn btn-primary-custom" id="btnSave">
                        <i class="bi bi-check2-circle me-1"></i> Guardar cambios
                    </button>
                    <span class="text-secondary small" id="updatedAt"></span>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (SecurityService.initPage()) {
            loadSettings();
        }

        async function loadSettings() {
            const alertEl = document.getElementById('alertConfig');
            try {
                const data = await fetchAPI('/management/system-settings/');
                document.getElementById('analysisInterval').value = data.analysis_interval_minutes;
                document.getElementById('twilioLimit').value = data.twilio_daily_message_limit;
                if (data.updated_at) {
                    const d = new Date(data.updated_at);
                    document.getElementById('updatedAt').textContent =
                        'Última actualización: ' + d.toLocaleString('es-CO');
                }
            } catch (error) {
                alertEl.classList.remove('d-none', 'alert-success');
                alertEl.classList.add('alert-danger');
                alertEl.textContent = 'No se pudo cargar la configuración.';
            }
        }

        document.getElementById('formConfig').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertEl = document.getElementById('alertConfig');
            const btn = document.getElementById('btnSave');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Guardando...';
            alertEl.classList.add('d-none');

            try {
                const payload = {
                    analysis_interval_minutes: parseInt(document.getElementById('analysisInterval').value, 10),
                    twilio_daily_message_limit: parseInt(document.getElementById('twilioLimit').value, 10),
                };
                const data = await fetchAPI('/management/system-settings/', {
                    method: 'PATCH',
                    body: JSON.stringify(payload),
                });

                document.getElementById('analysisInterval').value = data.analysis_interval_minutes;
                document.getElementById('twilioLimit').value = data.twilio_daily_message_limit;
                if (data.updated_at) {
                    const d = new Date(data.updated_at);
                    document.getElementById('updatedAt').textContent =
                        'Última actualización: ' + d.toLocaleString('es-CO');
                }

                alertEl.classList.remove('d-none', 'alert-danger');
                alertEl.classList.add('alert-success');
                alertEl.textContent = 'Cambios guardados correctamente.';
            } catch (error) {
                alertEl.classList.remove('d-none', 'alert-success');
                alertEl.classList.add('alert-danger');
                alertEl.textContent = 'No se pudo guardar la configuración.';
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
