<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Smart Migration System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar Layout -->
    <div class="sidebar">
        <div class="d-flex align-items-center gap-2 mb-5 px-2">
            <i class="bi bi-rocket-takeoff text-primary fs-3"></i>
            <h4 class="mb-0 fw-bold">SmartMig</h4>
        </div>

        <nav class="nav flex-column gap-1">
            <a href="dashboard.html" class="nav-link-custom">
                <i class="bi bi-house-door"></i> Inicio
            </a>
            
            <!-- Este menú siempre está visible aquí porque esta página es exclusiva de Admin -->
            <a href="usuarios.html" class="nav-link-custom active" id="navUsers">
                <i class="bi bi-people"></i> Gestión de Usuarios
            </a>
            
            <a href="#" class="nav-link-custom mt-auto text-danger mt-5" onclick="SecurityService.logout()">
                <i class="bi bi-box-arrow-left text-danger"></i> Cerrar Sesión
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content fade-in">
        <header class="mb-4">
            <h2 class="fw-bold">Gestión de Usuarios</h2>
            <p class="text-secondary mb-0">RF01: Crea y administra los roles de la plataforma.</p>
        </header>

        <div class="row">
            <!-- Formulario de Creación -->
            <div class="col-md-4 mb-4">
                <div class="glass-panel p-4">
                    <h5 class="mb-4 d-flex align-items-center gap-2">
                        <i class="bi bi-person-plus text-primary"></i> Nuevo Usuario
                    </h5>
                    
                    <div id="formAlert" class="alert d-none py-2 px-3 text-sm"></div>

                    <form id="createUserForm">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Rol</label>
                            <select id="role" class="form-select form-control-custom" required>
                                <option value="AGENT">Asesor</option>
                                <option value="ANALYST">Analista</option>
                                <option value="ADMIN">Administrador</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Username</label>
                            <input type="text" id="username" class="form-control form-control-custom" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control form-control-custom" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary small">Nombre</label>
                                <input type="text" id="first_name" class="form-control form-control-custom">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary small">Apellido</label>
                                <input type="text" id="last_name" class="form-control form-control-custom">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Contraseña</label>
                            <input type="password" id="password" class="form-control form-control-custom" minlength="8" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small">Confirmar Contraseña</label>
                            <input type="password" id="password_confirm" class="form-control form-control-custom" minlength="8" required>
                        </div>

                        <button type="submit" id="btnSubmit" class="btn btn-primary-custom w-100">Crear Usuario</button>
                    </form>
                </div>
            </div>

            <!-- Tabla de Usuarios -->
            <div class="col-md-8">
                <div class="glass-panel p-4">
                    <h5 class="mb-4 d-flex align-items-center gap-2">
                        <i class="bi bi-list-ul text-primary"></i> Lista de Usuarios
                    </h5>
                    
                    <div class="table-responsive">
                        <table class="table table-borderless table-custom">
                            <thead>
                                <tr>
                                    <th>Usuario</th>
                                    <th>Email</th>
                                    <th>Rol</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr>
                                    <td colspan="4" class="text-center text-secondary py-4">Cargando usuarios...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (necesario para selects/dropdowns si hubiese) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        // RF19 Backend + Frontend GUARD: Solo ADMIN puede ver esta página
        if(!SecurityService.isAuthenticated() || !SecurityService.hasRole(['ADMIN'])) {
            window.location.href = 'dashboard.html';
        }

        const loadUsers = async () => {
            const tbody = document.getElementById('usersTableBody');
            try {
                const data = await fetchAPI('/users/');
                
                // DRF Pagination returns results inside data.results
                const users = data.results || data; 

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">No hay usuarios</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td class="fw-medium">${user.username}</td>
                        <td class="text-secondary">${user.email}</td>
                        <td>
                            <span class="badge ${user.role === 'ADMIN' ? 'bg-danger' : user.role === 'ANALYST' ? 'bg-warning text-dark' : 'bg-success'} bg-opacity-75">
                                ${user.role_display}
                            </span>
                        </td>
                        <td>
                            ${user.is_active ? '<i class="bi bi-circle-fill text-success small"></i> Activo' : '<i class="bi bi-circle-fill text-secondary small"></i> Inactivo'}
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Error al cargar usuarios:", error);
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error al cargar usuarios</td></tr>';
            }
        };

        // Crear Usuario (RF01)
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const alert = document.getElementById('formAlert');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = 'Creando...';
            btn.disabled = true;
            alert.classList.add('d-none');
            alert.classList.remove('alert-success', 'alert-danger');

            const payload = {
                role: document.getElementById('role').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                password: document.getElementById('password').value,
                password_confirm: document.getElementById('password_confirm').value
            };

            try {
                await fetchAPI('/users/', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                alert.innerText = 'Usuario creado con éxito ✅';
                alert.classList.add('alert-success');
                alert.classList.remove('d-none');
                
                e.target.reset(); // Limpiar formulario
                loadUsers();      // Recargar tabla

            } catch (error) {
                alert.classList.add('alert-danger');
                alert.classList.remove('d-none');
                
                if (error.data) {
                    // Mostrar resumen de errores del serializer
                    const errorMsgs = [];
                    for(const key in error.data) {
                        errorMsgs.push(`${key}: ${error.data[key].join(', ')}`);
                    }
                    alert.innerText = errorMsgs.join(' | ');
                } else {
                    alert.innerText = 'Error inesperado al crear usuario.';
                }
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Cargar usuarios al inicio
        loadUsers();
    </script>
</body>
</html>
