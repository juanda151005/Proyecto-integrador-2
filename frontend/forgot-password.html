<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Smart Migration System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container fade-in" style="max-width: 450px;">
        <div class="glass-panel p-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle mb-3" style="width: 60px; height: 60px;">
                    <i class="bi bi-envelope-check text-primary fs-2"></i>
                </div>
                <h2 class="fw-bold mb-1">Recuperar Contraseña</h2>
                <p class="text-secondary text-sm px-2">Ingresa tu correo electrónico registrado y te enviaremos un enlace para restablecerla.</p>
            </div>

            <!-- Alerta de Éxito / Error (Oculta por defecto) -->
            <div id="statusAlert" class="alert d-none py-2 px-3 text-sm" role="alert"></div>

            <form id="forgotPasswordForm">
                <div class="mb-4">
                    <label class="form-label text-secondary small">Correo electrónico</label>
                    <input type="email" id="email" class="form-control form-control-custom" required placeholder="tu-correo@ejemplo.com">
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-primary-custom w-100 mb-3 d-flex justify-content-center align-items-center gap-2">
                    <span>Enviar enlace</span>
                    <i class="bi bi-send"></i>
                </button>
                
                <div class="text-center mt-3">
                    <a href="login.html" class="small text-decoration-none text-secondary">
                        <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const statusAlert = document.getElementById('statusAlert');
        const btnSubmit = document.getElementById('btnSubmit');

        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            statusAlert.classList.add('d-none');
            statusAlert.classList.remove('alert-success', 'alert-danger');
            
            // Estado de carga
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm" aria-hidden="true"></span> Enviando...';
            btnSubmit.disabled = true;

            const payload = {
                email: document.getElementById('email').value
            };

            try {
                // RF06: Endpoint sin autenticación
                const data = await fetchAPI('/auth/password-reset/', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                // Mostrar mensaje de éxito genérico (CP 1.1 y CP 1.2)
                statusAlert.classList.remove('d-none', 'alert-danger');
                statusAlert.classList.add('alert-success');
                statusAlert.innerText = data.detail || 'Si el correo está registrado, recibirás un enlace para restablecer tu contraseña en los próximos minutos.';
                
                // Limpiar el formulario
                forgotPasswordForm.reset();

            } catch (error) {
                statusAlert.classList.remove('d-none', 'alert-success');
                statusAlert.classList.add('alert-danger');
                if(error.data && error.data.detail) {
                    statusAlert.innerText = error.data.detail;
                } else if(error.data && error.data.email) {
                    statusAlert.innerText = error.data.email[0];
                } else {
                    statusAlert.innerText = 'Ha ocurrido un error. Intenta nuevamente más tarde.';
                }
            } finally {
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
